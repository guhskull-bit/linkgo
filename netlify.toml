[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev:vite"
  framework = "#custom"
  port = 8888
  targetPort = 5173
  publish = "dist"

[[redirects]]
  from = "/api/shorten"
  to = "/.netlify/functions/shorten"
  status = 200

[[redirects]]
  from = "/api/qrcode"
  to = "/.netlify/functions/qrcode"
  status = 200

[[redirects]]
  from = "/s/:slug"
  to = "/.netlify/functions/redirect?slug=:slug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
